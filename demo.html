<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSV POS — ລະບົບຂາຍໜ້າຮ້ານ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+Lao:wght@400;500;600;700&family=Noto+Serif+Lao:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#eef0f4;
  --surface:#ffffff;
  --surface-2:#f6f7f9;
  --ink:#11151f;
  --ink-soft:#5b6472;
  --line:#e4e7ee;
  --brand:#0e9f6e;
  --brand-2:#057a52;
  --brand-lite:#13c07f;
  --brand-soft:#e6f6ef;
  --accent:#f0653e;
  --gold:#e0a83d;
  --info:#2f7df6;
  --danger:#e23d4f;
  --side:#0d1320;
  --side-2:#141d30;
  --side-ink:#aeb8cc;
  --side-active:#1d2a44;
  --radius:16px;
  --radius-sm:11px;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 12px 28px -12px rgba(16,24,40,.18);
  --shadow-lg:0 24px 60px -20px rgba(16,24,40,.35);
  --font-lao:"Noto Sans Lao";
  --font:"Manrope",var(--font-lao),system-ui,sans-serif;
  --serif-lao:"Noto Serif Lao";
}
html[data-theme="dark"]{
  --bg:#080b12;
  --surface:#111722;
  --surface-2:#0c111b;
  --ink:#eaf0fb;
  --ink-soft:#8b97ab;
  --line:#1e2737;
  --brand-soft:#10271f;
  --side:#070a11;
  --side-2:#0c1220;
  --side-active:#172238;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 18px 40px -18px rgba(0,0,0,.7);
  --shadow-lg:0 28px 70px -20px rgba(0,0,0,.8);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  font-size:14.5px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
:lang(lo),.lo{font-family:var(--font-lao),var(--font)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(120,130,150,.35);border-radius:20px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:rgba(120,130,150,.55);background-clip:content-box}

/* ====== LOGIN ====== */
#login{
  position:fixed;inset:0;z-index:60;display:grid;place-items:center;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(14,159,110,.25), transparent 60%),
    radial-gradient(900px 500px at 0% 110%, rgba(47,125,246,.22), transparent 55%),
    #0a0f1a;
  font-family:var(--font-lao),var(--font);
}
.login-card{
  width:min(400px,92vw);background:rgba(17,23,34,.78);backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:38px 34px;
  box-shadow:0 40px 90px -30px rgba(0,0,0,.8);color:#eaf0fb;
}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.brandmark{
  width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-weight:800;
  background:linear-gradient(135deg,var(--brand),var(--brand-lite));color:#fff;font-family:var(--font);
  box-shadow:0 10px 24px -8px rgba(14,159,110,.7);letter-spacing:-.5px;
}
.login-logo b{font-family:var(--font);font-size:20px;letter-spacing:-.5px}
.login-logo span{display:block;font-size:11.5px;color:#8b97ab;font-weight:500;margin-top:1px}
#login h2{font-family:var(--serif-lao);font-size:21px;margin-bottom:5px;font-weight:700}
#login p.sub{color:#8b97ab;font-size:13px;margin-bottom:24px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;color:#9aa6ba;margin-bottom:7px;font-weight:500}
.field input{
  width:100%;padding:13px 15px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;color:#fff;outline:none;transition:.2s;
}
.field input:focus{border-color:var(--brand);background:rgba(14,159,110,.08)}
.btn-login{
  width:100%;margin-top:8px;padding:14px;border-radius:12px;font-weight:700;font-size:15px;
  background:linear-gradient(135deg,var(--brand),var(--brand-lite));color:#fff;transition:.2s;
  box-shadow:0 14px 30px -10px rgba(14,159,110,.6);
}
.btn-login:hover{transform:translateY(-1px);filter:brightness(1.05)}
.login-hint{margin-top:18px;font-size:12px;color:#6b7689;text-align:center}

/* ====== APP SHELL ====== */
#app{display:none;height:100vh;grid-template-columns:var(--side-w,256px) 1fr;transition:grid-template-columns .25s}
#app.collapsed{--side-w:78px}

.sidebar{
  background:linear-gradient(180deg,var(--side),var(--side-2));
  color:var(--side-ink);display:flex;flex-direction:column;overflow:hidden;position:relative;
  border-right:1px solid rgba(255,255,255,.04);
}
.side-head{display:flex;align-items:center;gap:11px;padding:18px 18px;min-height:66px}
.side-head .brandmark{width:40px;height:40px;flex:none;border-radius:11px}
.side-title b{color:#fff;font-size:17px;letter-spacing:-.4px;display:block;line-height:1}
.side-title span{font-size:10.5px;color:#6b7689;font-family:var(--font-lao);font-weight:500}
#app.collapsed .side-title{display:none}
.side-scroll{flex:1;overflow-y:auto;padding:6px 12px 18px;font-family:var(--font-lao)}
.side-scroll::-webkit-scrollbar{width:6px}
.nav-group-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:#566179;
  padding:16px 12px 7px;font-family:var(--font);font-weight:700}
#app.collapsed .nav-group-label{opacity:0;height:10px;padding:6px 0}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;
  color:var(--side-ink);font-size:14px;font-weight:500;transition:.16s;cursor:pointer;
  white-space:nowrap;position:relative;
}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:var(--side-active);color:#fff}
.nav-item.active::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;border-radius:3px;background:var(--brand)}
.nav-item svg{width:19px;height:19px;flex:none}
#app.collapsed .nav-item span{display:none}
#app.collapsed .nav-item{justify-content:center;padding:11px}

.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.loadwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;padding:50px 20px}
.spinner{width:38px;height:38px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:ksvspin .8s linear infinite}
@keyframes ksvspin{to{transform:rotate(360deg)}}
.topbar{
  height:66px;flex:none;display:flex;align-items:center;gap:14px;padding:0 22px;
  background:var(--surface);border-bottom:1px solid var(--line);
}
.icon-btn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:var(--ink-soft);transition:.15s}
.icon-btn:hover{background:var(--surface-2);color:var(--ink)}
.icon-btn svg{width:20px;height:20px}
.page-title{font-family:var(--font-lao);font-weight:700;font-size:17px;letter-spacing:-.2px}
.page-title small{display:block;font-size:11.5px;color:var(--ink-soft);font-weight:400}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.store-badge{font-size:12px;color:var(--ink-soft);font-family:var(--font-lao);padding:7px 12px;border-radius:9px;background:var(--surface-2)}
.user-chip{display:flex;align-items:center;gap:9px;padding:5px 7px 5px 5px;border-radius:30px;background:var(--surface-2);cursor:pointer}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand-lite));
  color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
.user-chip b{font-size:13px}

.content{flex:1;overflow-y:auto;padding:24px}
.view{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ====== DASHBOARD ====== */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px}
.tile{
  position:relative;border-radius:var(--radius);padding:18px;min-height:128px;color:#fff;overflow:hidden;
  display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:.2s;
  box-shadow:var(--shadow);font-family:var(--font-lao);isolation:isolate;
}
.tile:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.tile::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.16),transparent 50%);z-index:-1}
.tile .t-ico{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.18);display:grid;place-items:center}
.tile .t-ico svg{width:23px;height:23px}
.tile b{font-size:15px;font-weight:700;line-height:1.25}
.tile small{font-size:11.5px;opacity:.85;font-weight:400}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.stat-card .s-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat-card .s-lbl{font-size:12.5px;color:var(--ink-soft);font-family:var(--font-lao)}
.stat-card .s-ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center}
.stat-card .s-ico svg{width:20px;height:20px}
.stat-card .s-val{font-size:27px;font-weight:800;letter-spacing:-.6px}
.stat-card .s-val small{font-size:13px;color:var(--ink-soft);font-weight:600;font-family:var(--font-lao)}
.stat-card .s-sub{font-size:12px;color:var(--ink-soft);margin-top:4px;font-family:var(--font-lao)}
.section-h{font-family:var(--font-lao);font-weight:700;font-size:15px;margin:6px 2px 14px;display:flex;align-items:center;gap:8px}
.section-h .ln{flex:1;height:1px;background:var(--line)}

/* ====== CARD / TABLE ====== */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-head{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.card-head h3{font-family:var(--font-lao);font-size:15.5px;font-weight:700;display:flex;align-items:center;gap:9px}
.card-head .count{font-size:12px;color:var(--ink-soft);font-weight:500}
.card-tools{margin-left:auto;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse}
thead th{
  text-align:left;font-family:var(--font-lao);font-size:12px;font-weight:700;color:var(--ink-soft);
  padding:12px 16px;background:var(--surface-2);white-space:nowrap;position:sticky;top:0;letter-spacing:.01em;
}
tbody td{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
tbody tr{transition:.12s}
tbody tr:hover{background:var(--surface-2)}
tbody tr:last-child td{border-bottom:none}
.num{font-variant-numeric:tabular-nums;font-weight:600}
.muted{color:var(--ink-soft)}
.empty{padding:54px 20px;text-align:center;color:var(--ink-soft);font-family:var(--font-lao)}
.empty svg{width:46px;height:46px;opacity:.4;margin-bottom:12px}

/* ====== CONTROLS ====== */
.inp{
  padding:9px 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface);
  outline:none;transition:.15s;color:var(--ink);min-width:0;
}
.inp:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.search{position:relative;display:flex;align-items:center}
.search svg{position:absolute;left:11px;width:17px;height:17px;color:var(--ink-soft);pointer-events:none}
.search .inp{padding-left:34px}
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:10px;font-weight:600;
  font-size:13.5px;transition:.16s;font-family:var(--font-lao);white-space:nowrap;
  background:var(--surface-2);color:var(--ink);border:1px solid var(--line);
}
.btn svg{width:16px;height:16px}
.btn:hover{background:var(--line)}
.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-lite));color:#fff;border:none;box-shadow:0 8px 18px -8px rgba(14,159,110,.6)}
.btn-primary:hover{filter:brightness(1.06);transform:translateY(-1px)}
.btn-accent{background:linear-gradient(135deg,var(--accent),#f47e5c);color:#fff;border:none}
.btn-danger{background:var(--danger);color:#fff;border:none}
.btn-ghost{background:transparent;border:1px solid var(--line)}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
.btn-ico{width:34px;height:34px;padding:0;justify-content:center;border-radius:9px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:30px;font-size:11.5px;font-weight:600;font-family:var(--font-lao)}
.pill-green{background:var(--brand-soft);color:var(--brand-2)}
.pill-blue{background:#e7f0fe;color:#1f63d6}
.pill-amber{background:#fdf1dc;color:#a9781a}
.pill-red{background:#fce8ea;color:#c42d3d}
html[data-theme=dark] .pill-blue{background:#13233f;color:#7db0ff}
html[data-theme=dark] .pill-amber{background:#2c2310;color:#e6bf6a}
html[data-theme=dark] .pill-red{background:#2e1418;color:#f08a96}

/* ====== POS ====== */
.pos-wrap{display:flex;flex-direction:column;gap:16px}
.pos-topbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:11px 13px;box-shadow:var(--shadow)}
.pos-topbar select,.pos-topbar .inp{height:40px}
.bc-input{display:flex;gap:7px;flex:1;min-width:230px}
.bc-input .search{flex:1}
.seg{display:inline-flex;background:var(--surface-2);border-radius:9px;padding:2px;gap:2px}
.seg button{padding:7px 12px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--ink-soft);font-family:var(--font-lao)}
.seg button.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
.pos{display:grid;grid-template-columns:1fr 380px;gap:18px;align-items:start}
.pos-left{display:flex;flex-direction:column;gap:16px;min-height:0}
.pos-search{display:flex;gap:10px}
.pos-search .search{flex:1}
.cat-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
.cat-chip{padding:7px 15px;border-radius:30px;background:var(--surface);border:1px solid var(--line);
  font-size:13px;font-family:var(--font-lao);white-space:nowrap;font-weight:600;color:var(--ink-soft);transition:.15s}
.cat-chip.active{background:var(--ink);color:var(--surface);border-color:var(--ink)}
.prod-grid{max-height:56vh;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:13px;align-content:start;padding-right:4px}
.prod-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px;
  cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow)}
.prod-card:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.prod-card .p-thumb{height:70px;border-radius:10px;display:grid;place-items:center;font-size:26px;
  background:linear-gradient(135deg,var(--surface-2),var(--line));margin-bottom:4px}
.prod-card .p-name{font-family:var(--font-lao);font-weight:600;font-size:13px;line-height:1.3;min-height:34px}
.prod-card .p-price{color:var(--brand-2);font-weight:800;font-size:15px}
.prod-card .p-stock{font-size:11px;color:var(--ink-soft);font-family:var(--font-lao)}

.cart{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);display:flex;position:sticky;top:0;max-height:calc(100vh - 200px);
  flex-direction:column;box-shadow:var(--shadow);overflow:hidden}
.cart-head{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.cart-head h3{font-family:var(--font-lao);font-size:15px;font-weight:700;flex:1}
.cart-items{flex:1;overflow-y:auto;padding:10px}
.cart-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink-soft);font-family:var(--font-lao);gap:10px}
.cart-empty svg{width:54px;height:54px;opacity:.3}
.ci{display:flex;gap:10px;padding:10px;border-radius:11px;transition:.12s}
.ci:hover{background:var(--surface-2)}
.ci .ci-info{flex:1;min-width:0}
.ci .ci-name{font-family:var(--font-lao);font-weight:600;font-size:13px;line-height:1.25}
.ci .ci-price{font-size:12px;color:var(--ink-soft)}
.qty{display:flex;align-items:center;gap:0;background:var(--surface-2);border-radius:9px;padding:2px}
.qty button{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;color:var(--ink-soft);font-weight:700}
.qty button:hover{background:var(--surface);color:var(--ink)}
.qty input{width:34px;text-align:center;background:none;border:none;font-weight:700;font-size:13px}
.ci-total{font-weight:800;font-size:13.5px;min-width:74px;text-align:right;font-variant-numeric:tabular-nums}
.ci-del{color:var(--danger);opacity:.55}.ci-del:hover{opacity:1}
.cart-foot{border-top:1px solid var(--line);padding:16px 18px;background:var(--surface-2)}
.sumrow{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;font-family:var(--font-lao)}
.sumrow .v{font-variant-numeric:tabular-nums;font-weight:700;font-family:var(--font)}
.sum-total{font-size:20px;font-weight:800;padding-top:10px;border-top:1px dashed var(--line);margin-top:4px}
.sum-total .v{color:var(--brand-2);font-size:24px}
.pay-btn{width:100%;margin-top:14px;padding:15px;border-radius:13px;font-weight:800;font-size:16px;
  background:linear-gradient(135deg,var(--brand),var(--brand-lite));color:#fff;font-family:var(--font-lao);
  box-shadow:0 14px 30px -10px rgba(14,159,110,.6);transition:.18s}
.pay-btn:hover{transform:translateY(-2px);filter:brightness(1.05)}
.pay-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ====== MODAL ====== */
.overlay{position:fixed;inset:0;background:rgba(8,11,18,.55);backdrop-filter:blur(3px);z-index:80;
  display:grid;place-items:center;padding:20px;animation:fade .2s}
.modal{background:var(--surface);border-radius:20px;width:min(480px,94vw);max-height:90vh;overflow:auto;
  box-shadow:var(--shadow-lg);animation:pop .25s cubic-bezier(.2,.9,.3,1.2)}
.modal.wide{width:min(640px,94vw)}
@keyframes pop{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:none}}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.modal-head h3{font-family:var(--font-lao);font-size:17px;font-weight:700}
.modal-body{padding:22px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.fg label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;font-family:var(--font-lao);font-weight:500}
.fg .inp,.fg select,.fg textarea{width:100%}
.fg textarea{padding:10px 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface);resize:vertical;min-height:64px;outline:none}

.pay-amount{font-size:40px;font-weight:800;text-align:center;color:var(--danger);font-variant-numeric:tabular-nums;padding:6px 0 14px}
input.pay-amount{width:100%;border:2px solid var(--line);border-radius:12px;background:var(--surface);padding:8px 12px;outline:none}
input.pay-amount:focus{border-color:var(--brand)}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.keypad button{padding:18px;border-radius:13px;font-size:20px;font-weight:700;background:var(--surface-2);transition:.12s}
.keypad-pay{grid-template-columns:repeat(4,1fr);gap:8px}
.keypad-pay button{padding:14px 0;font-size:18px;border-radius:11px}
.keypad-pay .den{background:#36b6e0;color:#fff}
.keypad-pay .den:hover{filter:brightness(1.06)}
.keypad-pay .clr{background:linear-gradient(135deg,var(--gold),#eec069);color:#fff;font-size:14px;font-family:var(--font-lao)}
.pay-exact{width:100%;padding:15px;border-radius:13px;font-size:19px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,#2f7df6,#5a9bff);margin-bottom:12px;font-family:var(--font-lao)}

#printArea{display:none}
@media print{
  body{overflow:visible!important;background:#fff!important}
  body.printing>*:not(#printArea){display:none!important}
  #printArea{display:block!important;color:#000;font-family:"Noto Sans Lao",sans-serif}
  @page{margin:8mm}
}
.rc{color:#000;font-family:"Noto Sans Lao",sans-serif;background:#fff}
.rc.slip{width:72mm;margin:0 auto;font-size:12px}
.rc.a4{width:190mm;margin:0 auto;font-size:13px}
.rc.a5{width:148mm;margin:0 auto;font-size:11px}
.rc.a5 table td,.rc.a5 table th{padding:4px 6px}
.rc table{width:100%;border-collapse:collapse}
.rc.a4 table.items th,.rc.a4 table.items td,.rc.a5 table.items th,.rc.a5 table.items td{border:1px solid #000;padding:5px 7px}
.rc .center{text-align:center}.rc .right{text-align:right}.rc .bold{font-weight:700}
.rc .logo{width:64px;height:64px;border-radius:50%;object-fit:contain}
.keypad button:hover{background:var(--line)}
.keypad button.fn{background:var(--brand-soft);color:var(--brand-2);font-family:var(--font-lao);font-size:15px}

.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:#fff;padding:13px 18px;border-radius:12px;font-family:var(--font-lao);
  font-size:13.5px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;animation:slidein .3s}
.toast.ok{background:linear-gradient(135deg,var(--brand-2),var(--brand))}
.toast.err{background:var(--danger)}
@keyframes slidein{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}

.banner{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;font-family:var(--font-lao);
  font-size:13px;margin-bottom:18px}
.banner.warn{background:#fdf1dc;color:#8a6516;border:1px solid #f3dca0}
html[data-theme=dark] .banner.warn{background:#231b08;color:#e6bf6a;border-color:#3a2e10}
.banner svg{width:18px;height:18px;flex:none}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}

.submod{display:grid;grid-template-columns:230px 1fr;gap:18px;align-items:start}
.subnav{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:10px;position:sticky;top:0}
.subnav .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);font-weight:700;padding:13px 10px 6px;font-family:var(--font)}
.subnav .it{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:10px;font-family:var(--font-lao);font-size:13.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.14s}
.subnav .it:hover{background:var(--surface-2);color:var(--ink)}
.subnav .it.active{background:linear-gradient(135deg,var(--accent),#f47e5c);color:#fff;box-shadow:0 8px 18px -8px rgba(240,101,62,.6)}
.subnav .it svg{width:18px;height:18px;flex:none}
.totalrow td{background:var(--surface-2);font-weight:800;border-top:2px solid var(--line);border-bottom:none!important}
.toolbar2{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.date-range{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:3px 8px}
.date-range input{border:none;background:none;outline:none;padding:6px 4px;font-size:13px;color:var(--ink)}
.date-range span{color:var(--ink-soft)}
.chk{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-soft);font-family:var(--font-lao);cursor:pointer;user-select:none}
.chk input{width:16px;height:16px;accent-color:var(--brand)}
.pager{display:flex;align-items:center;gap:8px;padding:14px 16px;font-family:var(--font-lao);font-size:13px;color:var(--ink-soft)}
.pager select{padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:var(--surface)}
@media(max-width:860px){.submod{grid-template-columns:1fr}.subnav{position:static}}
@media(max-width:1080px){.pos{grid-template-columns:1fr}.pos-right{display:none}}
@media(max-width:720px){
  #app{grid-template-columns:0 1fr}#app .sidebar{position:fixed;z-index:70;width:256px;height:100vh;transform:translateX(-100%);transition:.25s}
  #app.mobile-open .sidebar{transform:none}
  .content{padding:16px}
}

/* ===================== STORE (DATA LAYER) ===================== */
const Store = {
  online(){ return !!CONFIG.APPS_SCRIPT_URL; },
  async api(action, table, payload){
    const url = CONFIG.APPS_SCRIPT_URL;
    const body = JSON.stringify({action, table, token:CONFIG.TOKEN, data:payload});
    if(action==='list'||action==='login'){
      // ອ່ານ: GET ?payload= (Apps Script ອະນຸຍາດ CORS ສຳລັບ GET)
      const res = await fetch(url+(url.indexOf('?')<0?'?':'&')+'payload='+encodeURIComponent(body));
      const j = await res.json();
      if(j.error) throw new Error(j.error);
      return j.data;
    }
    // ຂຽນ: Apps Script block ການອ່ານ POST (CORS) — ສົ່ງແບບ no-cors (ຂຽນເຖິງ server ສຳເລັດ) ແລ້ວ caller ດຶງລາຍການໃໝ່ຢືນຢັນ
    await fetch(url, {method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain;charset=utf-8"}, body});
    return payload;
  },
  _cache:{},
  clearCache(table){ if(table) delete this._cache[table]; else this._cache={}; },
  async list(table, force){
    if(this.online()){
      if(!force && this._cache[table]) return this._cache[table];   // ໃຊ້ cache → ປ່ຽນໜ້າໄວ
      const data = await this.api("list", table);
      this._cache[table] = data;
      return data;
    }
    return JSON.parse(JSON.stringify(DEMO[table]||[]));
  },
  async create(table, row){
    row.id = row.id || (table.slice(0,2)+Date.now());
    if(this.online()){ const r=await this.api("create", table, row); delete this._cache[table]; return r; }
    DEMO[table] = DEMO[table]||[]; DEMO[table].unshift(row); return row;
  },
  async update(table, row){
    if(this.online()){ const r=await this.api("update", table, row); delete this._cache[table]; return r; }
    const arr = DEMO[table]||[]; const i = arr.findIndex(x=>x.id===row.id);
    if(i>=0) arr[i]=Object.assign({},arr[i],row); return row;
  },
  async remove(table, id){
    if(this.online()){ const r=await this.api("delete", table, {id}); delete this._cache[table]; return r; }
    DEMO[table] = (DEMO[table]||[]).filter(x=>x.id!==id); return true;
  }
};

const $ = s=>document.querySelector(s);
const fmt = n => (Number(n)||0).toLocaleString('en-US');
const fmtDate = v => { if(!v) return ''; const s=String(v).trim(); if(/T.*Z$/.test(s)){ const d=new Date(s); if(!isNaN(d)){ d.setUTCHours(d.getUTCHours()+7); return d.toISOString().slice(0,10); } } return s.slice(0,10); };
/* ແປງຕົວເລກເປັນຄຳອ່ານພາສາລາວ (ກີບ) */
function kipWords(num){
  num=Math.round(Number(num)||0); if(num===0) return 'ສູນກີບຖ້ວນ';
  const d=['ສູນ','ໜຶ່ງ','ສອງ','ສາມ','ສີ່','ຫ້າ','ຫົກ','ເຈັດ','ແປດ','ເກົ້າ'];
  const pos=['','ສິບ','ຮ້ອຍ','ພັນ','ໝື່ນ','ແສນ'];
  function under(n){ // n < 1,000,000
    let s=''; const str=String(n); const len=str.length;
    for(let i=0;i<len;i++){ const dig=+str[i]; const place=len-1-i; if(dig===0) continue;
      if(place===1){ s+= dig===1?'ສິບ': dig===2?'ຊາວ': d[dig]+'ສິບ'; }
      else if(place===0){ s+= (dig===1 && len>1)?'ເອັດ':d[dig]; }
      else s+= d[dig]+pos[place];
    }
    return s;
  }
  let result='';
  if(num>=1000000){ result+=kipWords(Math.floor(num/1000000)).replace('ກີບຖ້ວນ','')+'ລ້ານ'; num=num%1000000; }
  result+=under(num);
  return result+'ກີບຖ້ວນ';
}
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg,type=''){
  const el=document.createElement('div'); el.className='toast '+type;
  el.innerHTML=(type==='ok'?I.check:type==='err'?I.close:'')+'<span class="lo">'+esc(msg)+'</span>';
  $('#toasts').appendChild(el); setTimeout(()=>{el.style.opacity=0;el.style.transform='translateX(40px)';setTimeout(()=>el.remove(),300)},2600);
}
let MODAL=null;
function modal(html,wide){
  closeModal();
  const o=document.createElement('div'); o.className='overlay'; o.onclick=e=>{if(e.target===o)closeModal()};
  o.innerHTML='<div class="modal '+(wide?'wide':'')+'">'+html+'</div>';
  document.body.appendChild(o); MODAL=o; return o;
}
function closeModal(){ if(MODAL){MODAL.remove();MODAL=null} }

  _hex2rgb(h){ h=h.replace('#',''); if(h.length===3)h=h.split('').map(c=>c+c).join(''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; },
  _mix(h,target,amt){ const a=this._hex2rgb(h); const r=Math.round(a[0]+(target-a[0])*amt),g=Math.round(a[1]+(target-a[1])*amt),b=Math.round(a[2]+(target-a[2])*amt); return '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,x)).toString(16).padStart(2,'0')).join(''); },

      if(src){ el.innerHTML='<img src="'+src+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block" onerror="this.onerror=null;this.parentNode.textContent=\'K\'">'; }
      else { if(el.querySelector('img')) el.textContent='K'; }
    });
  },
  _driveDirect(u){ if(!u) return u; const m=String(u).match(/drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?[^]*?id=|thumbnail\?[^]*?id=)([A-Za-z0-9_-]+)/); return m?('https://drive.google.com/thumbnail?id='+m[1]+'&sz=w512'):u; },
  logoFromUrl(v){ this.logo=this._driveDirect((v||'').trim()); this.applyLogo(this.logo); },
  logoFromFile(input){ const fl=input.files&&input.files[0]; if(!fl)return;
    if(fl.size>900000){ toast('ຮູບໃຫຍ່ເກີນ (ສູງສຸດ ~900KB) — ຫຍໍ້ຮູບກ່ອນ','err'); return; }
    const rd=new FileReader(); rd.onload=e=>{ this.logo=e.target.result; this.applyLogo(this.logo); const u=$('#setLogoUrl'); if(u)u.value=''; toast('ໂຫຼດຮູບແລ້ວ — ກົດ "ບັນທຶກ" ເພື່ອບັນທຶກຖາວອນ','ok'); }; rd.readAsDataURL(fl);
  },
  logoClear(){ this.logo=''; this.applyLogo(''); const u=$('#setLogoUrl'); if(u)u.value=''; },
  _qrSet(i,key,val){ this.qr[i]=this.qr[i]||{}; if(key==='img') val=this._driveDirect((val||'').trim()); this.qr[i][key]=val; if(key==='img'){ const p=$('#qrPrev'+i); if(p)p.style.backgroundImage=val?'url('+val+')':''; } },
  _qrFile(i,input){ const fl=input.files&&input.files[0]; if(!fl)return; if(fl.size>500000){ toast('ຮູບ QR ໃຫຍ່ເກີນ (~500KB)','err'); return; } const rd=new FileReader(); rd.onload=e=>{ this.qr[i]=this.qr[i]||{}; this.qr[i].img=e.target.result; const p=$('#qrPrev'+i); if(p)p.style.backgroundImage='url('+e.target.result+')'; toast('ໂຫຼດ QR ແລ້ວ — ກົດ "ບັນທຶກ QR"','ok'); }; rd.readAsDataURL(fl); },
  saveQR(){ localStorage_set('ksv-qr',JSON.stringify(this.qr)); this.syncShopSettings(); toast('ບັນທຶກ QR ແລ້ວ','ok'); },
  async loadShopSettings(){
    if(!Store.online()) return;
    try{
      const rows=await Store.list('settings');
      const s=(rows||[]).find(function(x){return x.id==='shop';});
      if(!s) return;
      if(s.storename){ CONFIG.STORE_NAME=s.storename; localStorage_set('ksv-store',s.storename); }
      if(s.currency){ CONFIG.CURRENCY=s.currency; localStorage_set('ksv-cur',s.currency); }
      this.shop={phone:s.phone||'',addr:s.addr||'',acct:s.acct||'',email:s.email||''};
      localStorage_set('ksv-phone',this.shop.phone); localStorage_set('ksv-addr',this.shop.addr); localStorage_set('ksv-acct',this.shop.acct); localStorage_set('ksv-email',this.shop.email);
      if(s.logo!=null&&s.logo!==''){ this.logo=s.logo; localStorage_set('ksv-logo',s.logo); this.applyLogo(s.logo); }
      if(s.qr){ try{ this.qr=JSON.parse(s.qr)||[]; localStorage_set('ksv-qr',s.qr); }catch(e){} }
      if(s.brand){ this.brand=s.brand; localStorage_set('ksv-brand',s.brand); this.applyBrand(s.brand); }
      if(s.bg!=null&&s.bg!==''){ this.bg=s.bg; localStorage_set('ksv-bg',s.bg); this.applyBg(s.bg); }
      const sb=$('#storeBadge'); if(sb) sb.textContent=CONFIG.STORE_NAME;
    }catch(e){}
  },
  async syncShopSettings(){
    if(!Store.online()) return;
    try{
      const row={id:'shop', storename:CONFIG.STORE_NAME, currency:CONFIG.CURRENCY, phone:this.shop.phone||'', addr:this.shop.addr||'', acct:this.shop.acct||'', email:this.shop.email||'', logo:this.logo||'', qr:JSON.stringify(this.qr||[]), brand:this.brand||'', bg:this.bg||''};
      const rows=await Store.list('settings');
      const exists=(rows||[]).some(function(x){return x.id==='shop';});
      if(exists) await Store.update('settings',row); else await Store.create('settings',row);
    }catch(e){}
  },
  applyBrand(hex){
    const rs=document.documentElement.style;
    rs.setProperty('--brand',hex);
    rs.setProperty('--brand-2',this._mix(hex,0,0.28));   // ເຂັ້ມຂຶ້ນ
    rs.setProperty('--brand-lite',this._mix(hex,255,0.18)); // ອ່ອນລົງ
    const rgb=this._hex2rgb(hex);
    rs.setProperty('--brand-soft', document.documentElement.getAttribute('data-theme')==='dark'
      ? 'rgba('+rgb.join(',')+',0.16)' : 'rgba('+rgb.join(',')+',0.12)');
  },

      c.innerHTML=tableView({
        title:'ລາຍການຮັບສ້ອມແປງ', icon:'wrench', count:data.length+' ລາຍການ', search:true,
        addLabel:'ເພີ່ມລາຍການສ້ອມແປງ', addFn:"App.editRepair()",
        extra:`<button class="btn lo" onclick="App.exportCSV('repair')">${I.download} Excel</button>`,
        cols:['ໃບຮັບ','ລູກຄ້າ','ສິນຄ້າ','ອາການເສຍ','ຄ່າສ້ອມ','ວັນນັດຮັບ','ສະຖານະ',''],

          <td class="num" style="font-weight:700">${esc(r.runno||r.id)}</td>

          <td><select class="inp" style="min-width:118px;height:34px;padding:4px 8px" onchange="App.repairStatus('${r.id}',this.value)">${STA.map(st=>`<option ${r.status===st?'selected':''}>${st}</option>`).join('')}</select></td>

            <button class="btn btn-ico btn-ghost" onclick="App.viewRepair('${r.id}')" title="ເບິ່ງບິນ" style="color:#2f7df6">${I.eye}</button>
            <button class="btn btn-ico btn-ghost" onclick="App.repairReceipt('${r.id}')" title="ພິມບິນໃຫ້ລູກຄ້າ" style="color:var(--brand-2)">${I.printer}</button>
            <button class="btn btn-ico btn-ghost" onclick="App.editRepair('${r.id}')" title="ແກ້ໄຂ" style="color:var(--gold)">${I.edit}</button>
            <button class="btn btn-ico btn-ghost" onclick="App.delRow('repair','${r.id}')" title="ລຶບ" style="color:var(--danger)">${I.trash}</button>
          </div></td></tr>`
      })+`<div class="card" style="margin-top:12px"><div style="padding:14px 18px;display:flex;justify-content:flex-end;gap:14px;align-items:center"><span class="lo muted">ລວມຄ່າສ້ອມທັງໝົດ (${data.length} ລາຍການ):</span><span style="font-weight:800;color:var(--brand-2);font-size:16px">${fmt(data.reduce(function(a,b){return a+(+b.cost||0);},0))} ${CONFIG.CURRENCY}</span></div></div>`;
    },

    async printjob(c){
      const data=await Store.list('printjob'); App.state.data.printjob=data;
      const STA=['ມາໃໝ່','ກຳລັງເຮັດ','ສຳເລັດ','ຮັບເຄື່ອງແລ້ວ','ຍົກເລີກ'];
      c.innerHTML=tableView({
        title:'ລາຍການສິ່ງພິມ', icon:'printer', count:data.length+' ລາຍການ', search:true,
        addLabel:'ເພີ່ມລາຍການສິ່ງພິມ', addFn:"App.editPrintJob()",
        extra:`<button class="btn lo" onclick="App.exportCSV('printjob')">${I.download} Excel</button>`,
        cols:['ໃບຮັບ','ລູກຄ້າ','ລາຍການ','ຂະໜາດ','ລາຄາ','ວັນນັດຮັບ','ສະຖານະ',''],
        rows:data, empty:'ຍັງບໍ່ມີລາຍການສິ່ງພິມ',
        render:r=>`<tr>
          <td class="num" style="font-weight:700">${esc(r.runno||r.id)}</td>
          <td class="lo"><div style="font-weight:600">${esc(r.name)}</div><div class="muted" style="font-size:12px">${esc(r.phone)}</div></td>
          <td class="lo">${esc(r.content)||'-'}</td>
          <td class="lo">${esc(r.size)||'-'}</td>
          <td class="num">${fmt(r.price)} <span class="muted">${CONFIG.CURRENCY}</span></td>
          <td class="num">${fmtDate(r.pickupdate)||'-'}</td>
          <td><select class="inp" style="min-width:118px;height:34px;padding:4px 8px" onchange="App.printjobStatus('${r.id}',this.value)">${STA.map(st=>`<option ${r.status===st?'selected':''}>${st}</option>`).join('')}</select></td>
          <td><div style="display:flex;gap:6px;justify-content:flex-end">
            <button class="btn btn-ico btn-ghost" onclick="App.viewPrintJob('${r.id}')" title="ເບິ່ງບິນ" style="color:#2f7df6">${I.eye}</button>
            <button class="btn btn-ico btn-ghost" onclick="App.printjobReceipt('${r.id}')" title="ພິມບິນ" style="color:var(--brand-2)">${I.printer}</button>
            <button class="btn btn-ico btn-ghost" onclick="App.editPrintJob('${r.id}')" title="ແກ້ໄຂ" style="color:var(--gold)">${I.edit}</button>
            <button class="btn btn-ico btn-ghost" onclick="App.delRow('printjob','${r.id}')" title="ລຶບ" style="color:var(--danger)">${I.trash}</button>
          </div></td></tr>`
      })+`<div class="card" style="margin-top:12px"><div style="padding:14px 18px;display:flex;justify-content:flex-end;gap:14px;align-items:center"><span class="lo muted">ລວມລາຄາທັງໝົດ (${data.length} ລາຍການ):</span><span style="font-weight:800;color:var(--brand-2);font-size:16px">${fmt(data.reduce(function(a,b){return a+(+b.price||0);},0))} ${CONFIG.CURRENCY}</span></div></div>`;
    },

    placeholder(c){
      const meta=App.routeMeta(App.state.route);
      c.innerHTML=`<div class="card"><div class="empty">${I.inbox}
        <div style="font-weight:700;font-size:15px;margin-bottom:6px">${esc(meta.t)}</div>
        <div style="font-size:13px">ໂມດູນນີ້ກຽມພ້ອມໂຄງສ້າງແລ້ວ — ສາມາດຕໍ່ຍອດເພີ່ມໄດ້ ໂດຍໃຊ້ຮູບແບບ table/form ດຽວກັນກັບໂມດູນອື່ນ.</div>
        </div></div>`;
    },
  },

  /* ---------- POS LOGIC ---------- */
  posCat(ct){
    this.state.cat=ct;
    document.querySelectorAll('#catChips .cat-chip').forEach(el=>el.classList.toggle('active',(el.textContent==='ທັງໝົດ'?'all':el.textContent)===ct));
    const top=$('#posCatTop'); if(top&&top.value!==ct) top.value=ct;
    this.posRender();
  },
  scanBarcode(){
    const el=$('#posBarcode'); const code=((el||{}).value||'').trim(); if(!code)return;
    const p=(this.state.posProducts||[]).find(x=>String(x.barcode)===code || x.name.toLowerCase()===code.toLowerCase());
    if(p){ this.addToCart(p.id); el.value=''; }
    else toast('ບໍ່ພົບສິນຄ້າລະຫັດ '+code,'err');
  },
  openDrawer(){ toast('ເປີດລິ້ນຊັກເງິນ 💰','ok'); },

  /* ---------- POS: CUSTOMER ---------- */
  posCustomer(){
    modal(`<div class="modal-head"><h3 class="lo">ຄົ້ນຫາລູກຄ້າ</h3><button class="icon-btn" style="margin-left:auto" onclick="closeModal()">${I.close}</button></div>
      <div class="modal-body">
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <div class="search" style="flex:1">${I.search}<input class="inp" id="pcQ" placeholder="ຄົ້ນຫາ ລະຫັດ, ຊື່, ເບີໂທ" oninput="App.posCustRender()"></div>
          <button class="btn btn-primary lo" onclick="App.posCustNew()">${I.plus} ເພີ່ມລູກຄ້າໃໝ່</button>
        </div>
        <div class="table-wrap" style="max-height:46vh;overflow:auto"><table>
          <thead><tr><th class="lo">ເລືອກ</th><th class="lo">ລະຫັດສະມາຊິກ</th><th class="lo">ຊື່ລູກຄ້າ</th><th class="lo">ເບີໂທ</th><th class="lo">ກຸ່ມ</th><th class="lo">ທີ່ຢູ່</th></tr></thead>
          <tbody id="pcBody"></tbody>
        </table></div>
      </div>
      <div class="modal-foot"><button class="btn lo" onclick="App.posPickCust('')">ໃຊ້ລູກຄ້າທົ່ວໄປ</button><button class="btn lo" onclick="closeModal()">Close</button></div>`,true);
    this.posCustRender();
  },
  posCustRender(){
    const q=(($('#pcQ')||{}).value||'').toLowerCase();
    const rows=(this.state.data.customers||[]).filter(c=>!q||[c.code,c.name,c.phone].some(v=>String(v||'').toLowerCase().includes(q)));
    const b=$('#pcBody'); if(!b)return;
    b.innerHTML=rows.length?rows.map(c=>`<tr>
      <td><button class="btn btn-sm lo" style="background:var(--brand);color:#fff;border:none" onclick="App.posPickCust('${esc(c.name)}')">ເລືອກ</button></td>
      <td class="num">${esc(c.code)||'-'}</td><td class="lo" style="font-weight:600">${esc(c.name)}</td>
      <td class="num">${esc(c.phone)||'-'}</td><td class="lo">${esc(c.group)||'-'}</td><td class="lo muted">${esc(c.address)||'-'}</td></tr>`).join('')
      :`<tr><td colspan="6"><div class="empty">${I.inbox}<div class="lo">ບໍ່ພົບລູກຄ້າ</div></div></td></tr>`;
  },
  posPickCust(name){ this.state.posCust=name; const s=$('#posCust'); if(s)s.value=name; closeModal(); toast(name?('ເລືອກລູກຄ້າ: '+name):'ໃຊ້ລູກຄ້າທົ່ວໄປ','ok'); },
  posCustNew(){
    modal(formModal('ເພີ່ມລູກຄ້າໃໝ່',[
      {k:'name',l:'ຊື່ລູກຄ້າ',v:'',full:1},{k:'phone',l:'ເບີໂທ',v:''},{k:'code',l:'ລະຫັດສະມາຊິກ',v:''},
      {k:'group',l:'ກຸ່ມ',v:''},{k:'address',l:'ທີ່ຢູ່',v:'',full:1}
    ],"App.posSaveCust()"));
  },
  async posSaveCust(){
    const row={}; document.querySelectorAll('#formModal [data-k]').forEach(el=>row[el.dataset.k]=el.value);
    if(!row.name){ toast('ກະລຸນາໃສ່ຊື່ລູກຄ້າ','err'); return; }
    await Store.create('customers',row); this.state.data.customers=await Store.list('customers');
    closeModal(); this.state.posCust=row.name; const s=$('#posCust'); if(s){ this.route(); }
    toast('ເພີ່ມລູກຄ້າ ແລະ ເລືອກແລ້ວ','ok');
  },

  /* ---------- POS: STOCK VIEW ---------- */
  posStock(){
    modal(`<div class="modal-head"><h3 class="lo">${I.box} ສະຕັອກສິນຄ້າຄົງເຫຼືອ</h3><button class="icon-btn" style="margin-left:auto" onclick="closeModal()">${I.close}</button></div>
      <div class="modal-body">
        <div class="search" style="margin-bottom:10px">${I.search}<input class="inp" id="psQ" placeholder="ຄົ້ນຫາ ລະຫັດ, ຊື່ສິນຄ້າ, ໝວດໝູ່" oninput="App.posStockRender()"></div>
        <div class="table-wrap" style="max-height:54vh;overflow:auto"><table>
          <thead><tr><th class="lo">ລຳດັບ</th><th class="lo">ລະຫັດ/ບາໂຄດ</th><th class="lo">ຊື່ສິນຄ້າ</th><th class="lo">ໝວດໝູ່</th><th class="lo">ລາຄາຍ່ອຍ</th><th class="lo">ຄົງເຫຼືອ</th><th class="lo">ໜ່ວຍ</th><th class="lo">Zone</th></tr></thead>
          <tbody id="psBody"></tbody>
        </table></div>
      </div>
      <div class="modal-foot"><button class="btn lo" onclick="App.exportCSV('products')">${I.download} Excel</button><button class="btn lo" onclick="closeModal()">Close</button></div>`,true);
    this.posStockRender();
  },
  posStockRender(){
    const q=(($('#psQ')||{}).value||'').toLowerCase();
    const rows=(this.state.posProducts||this.state.data.products||[]).filter(p=>!q||[p.barcode,p.name,p.category].some(v=>String(v||'').toLowerCase().includes(q)));
    const b=$('#psBody'); if(!b)return;
    b.innerHTML=rows.length?rows.map((p,i)=>`<tr>
      <td class="num muted">${i+1}</td><td class="num">${esc(p.barcode)||'-'}</td>
      <td class="lo" style="font-weight:600">${esc(p.name)}</td><td><span class="pill pill-blue">${esc(p.category)||'-'}</span></td>
      <td class="num">${fmt(App.priceOf(p))}</td>
      <td><span class="pill ${+p.stock<=(+p.lowstock||5)?'pill-red':'pill-green'}">${App.stockText(p)}</span></td>
      <td class="lo muted">${esc(p.unit)||'-'}</td><td class="lo muted">${esc(p.zone)||'-'}</td></tr>`).join('')
      :`<tr><td colspan="8"><div class="empty">${I.inbox}<div class="lo">ບໍ່ພົບສິນຄ້າ</div></div></td></tr>`;
  },

      <div class="modal-body">
        <div style="display:flex;gap:8px;margin-bottom:12px">

  retCalc(){
    const lines=this.state.retLines||[]; let total=0;
    lines.forEach((l,i)=>{ const q=Math.min(+(($('#ret-'+i)||{}).value||0),l.qty); const t=q*l.price; total+=t; const c=$('#retT-'+i); if(c)c.textContent=fmt(t); });
    const el=$('#retTotal'); if(el)el.textContent=fmt(total)+' '+CONFIG.CURRENCY;

  async retDo(){
    const lines=this.state.retLines||[], bill=this.state.retBill;
    const ret=lines.map((l,i)=>({name:l.name,price:l.price,qty:Math.min(+(($('#ret-'+i)||{}).value||0),l.qty)})).filter(x=>x.qty>0);
    if(!ret.length){ toast('ກະລຸນາໃສ່ຈຳນວນຄືນ','err'); return; }
    const total=ret.reduce((a,b)=>a+b.qty*b.price,0);
    // ຄືນສະຕັອກ
    for(const r of ret){ const p=(this.state.data.products||[]).find(x=>x.name===r.name); if(p){ p.stock=(+p.stock)+r.qty; await Store.update('products',{id:p.id,stock:p.stock}); } }
    const rec={ runno:'RT-'+String(Date.now()).slice(-8), ref:bill.runno, date:new Date().toISOString().slice(0,16).replace('T',' '),
      cashier:this.state.user.name, customer:bill.customer||'', items:ret.reduce((a,b)=>a+b.qty,0), total, lines:JSON.stringify(ret) };
    try{ await Store.create('returns',rec); this.state.data.returns=await Store.list('returns'); }catch(e){}
    closeModal(); toast('ຄືນສິນຄ້າ '+rec.items+' ລາຍການ · ຄືນເງິນ '+fmt(total)+' '+CONFIG.CURRENCY,'ok');
    if(this.state.route==='products') this.prodRender();

        <button class="btn lo" style="background:var(--danger);color:#fff;border:none" onclick="App.doCloseShift('logout')">${I.logout} ປິດກະ ແລະ ອອກຈາກລະບົບ</button>

    setTimeout(()=>{ const k=document.getElementById('shKeepStart'); if(k)k.onchange=()=>{ document.getElementById('shStartBox').style.display=k.checked?'block':'none'; }; },10);

  shiftDiff(expected){ const v=+(document.getElementById('shCount').value||0); const d=v-expected; const el=document.getElementById('shDiff'); if(el){ el.textContent=(d>0?'+':'')+fmt(d); el.style.color=d<0?'var(--danger)':'var(--brand-2)'; } },
  doCloseShift(action){

    localStorage_set('ksv-startcash',startNext);

  posRender(){

    const cat=this.state.cat;
    const list=(this.state.posProducts||[]).filter(p=>{
      const okC = cat==='all'||p.category===cat;
      const okQ = !q || p.name.toLowerCase().includes(q) || String(p.barcode).includes(q);

    });

      <div class="prod-card" onclick="App.addToCart('${p.id}')">
        <div style="font-size:11px;color:var(--ink-soft);display:flex;justify-content:space-between"><span class="num">${esc(p.barcode)||''}</span><span class="lo" style="color:var(--danger);font-weight:600">ເຫຼືອ ${App.stockText(p)}</span></div>
        <div class="p-thumb">${p.image?'<img src="'+esc(p.image)+'" onerror="this.style.display=\'none\';this.parentNode.innerHTML=\''+emo[i%emo.length]+'\'" style="width:100%;height:100%;object-fit:cover;border-radius:10px">':emo[i%emo.length]}</div>

          <div class="lo" style="display:flex;justify-content:space-between;align-items:center;padding:3px 6px;border-radius:7px;cursor:pointer" onmouseover="this.style.background='var(--brand-soft)'" onmouseout="this.style.background='none'" onclick="event.stopPropagation();App.addUnit('${p.id}','sub')"><span style="font-size:12px;color:var(--ink-soft)">${esc(p.unit||'ໜ່ວຍ')}</span><span style="color:var(--brand-2);font-weight:700">${fmt(App.priceOf(p))}</span></div>

  },
  priceOf(p){ const lv=this.state.priceLevel||1; const v=lv>1?+p['price'+lv]:+p.price; return v||+p.price||0; },
  _prod(id){ return (this.state.data.products||this.state.posProducts||[]).find(x=>x.id===id); },
  hasBig(p){ return !!(p && p.unitBig && +p.bigRatio>1); },
  // ສະຕັອກນັບເປັນ "ຍ່ອຍ" (smallest unit)
  availableStock(p){ if(!p) return 0; if(p.trackstock==='0'||p.trackstock===0) return Infinity; return +p.stock||0; },
  // ຂໍ້ຄວາມສະຕັອກ: "X ໃຫຍ່ Y ຍ່ອຍ"
  stockText(p){
    if(p.trackstock==='0'||p.trackstock===0) return '∞';
    const s=+p.stock||0;
    if(this.hasBig(p)){ const r=+p.bigRatio; const big=Math.floor(s/r), sub=s%r; return big+' '+esc(p.unitBig)+(sub?(' '+sub+' '+esc(p.unit||'ໜ່ວຍ')):''); }
    return fmt(s)+' '+esc(p.unit||'ໜ່ວຍ');
  },
  cartBaseQty(id){ return (this.state.cart||[]).filter(x=>x.id===id).reduce((a,b)=>a+b.qty*(+b.basePer||1),0); },
  setBillCurrency(v){ this.state.billCurrency=v; this.cartRender(); },
  setPriceLevel(lv){ this.state.priceLevel=+lv; (this.state.cart||[]).forEach(it=>{ if(it.basePer>1)return; const p=this._prod(it.id); if(p)it.price=this.priceOf(p); }); this.cartRender(); },
  addToCart(id){ this.addLine(id,'sub'); },
  addUnit(id,kind){ this.addLine(id,kind); },
  addLine(id,kind){
    const p=(this.state.posProducts||[]).find(x=>x.id===id); if(!p)return;
    const isBig = kind==='big' && this.hasBig(p);
    const basePer = isBig?(+p.bigRatio):1;
    const unit = isBig?p.unitBig:(p.unit||'ໜ່ວຍ');
    const price = isBig?(+p.priceBig||0):this.priceOf(p);
    const key = id+'|'+(isBig?'big':'sub');
    const avail=this.availableStock(p);
    if(avail!==Infinity && this.cartBaseQty(id)+basePer > avail){ toast('⚠️ ສະຕັອກ "'+p.name+'" ບໍ່ພໍຂາຍ — ເຫຼືອ '+this.stockText(p),'err'); return; }
    const ex=this.state.cart.find(x=>x.key===key);
    if(ex) ex.qty++; else this.state.cart.push({key,id:p.id,name:p.name,unit,price,qty:1,basePer,disc:0});
    this.cartRender(); toast(p.name+(isBig?' ('+unit+')':'')+' ເພີ່ມເຂົ້າກະຕ່າ','ok');
  },
  setQty(key,d){ const it=this.state.cart.find(x=>x.key===key); if(!it)return;
    const p=this._prod(it.id); const nv=Math.max(1,it.qty+d);
    if(d>0 && p){ const other=this.cartBaseQty(it.id)-it.qty*(+it.basePer||1); if(this.availableStock(p)!==Infinity && other+nv*(+it.basePer||1)>this.availableStock(p)){ toast('⚠️ ສະຕັອກບໍ່ພໍ (ເຫຼືອ '+this.stockText(p)+')','err'); return; } }
    it.qty=nv; this.cartRender(); },
  setQtyVal(key,v){ const it=this.state.cart.find(x=>x.key===key); if(!it)return;
    const p=this._prod(it.id); let nv=Math.max(1,parseInt(v)||1);
    if(p && this.availableStock(p)!==Infinity){ const other=this.cartBaseQty(it.id)-it.qty*(+it.basePer||1); const maxQty=Math.floor((this.availableStock(p)-other)/(+it.basePer||1));
      if(nv>maxQty){ toast('⚠️ ສະຕັອກບໍ່ພໍ — ປັບເປັນ '+Math.max(1,maxQty),'err'); nv=Math.max(1,maxQty); } }
    it.qty=nv; this.cartRender(); },
  setLineDisc(key,v){ const it=this.state.cart.find(x=>x.key===key); if(!it)return; it.disc=Math.max(0,+v||0); this.cartRender(); },
  rmCart(key){ this.state.cart=this.state.cart.filter(x=>x.key!==key); this.cartRender(); },
  lineTotal(it){ return Math.max(0, it.price*it.qty - (+it.disc||0)); },
  cartSub(){ return (this.state.cart||[]).reduce((a,b)=>a+this.lineTotal(b),0); },
  cartBeforeVat(){ const sub=this.cartSub(); const raw=+(this.state.discountRaw||0); const d=this.state.discType==='%'?Math.round(sub*raw/100):raw; this.state.discount=d; return Math.max(0,sub-d); },
  cartVat(){ const r=+(this.state.vatRate==null?10:this.state.vatRate); return this.state.vatOn?Math.round(this.cartBeforeVat()*r/100):0; },
  cartTotal(){ return this.cartBeforeVat()+this.cartVat(); },
  cartRender(){
    const cart=this.state.cart;
    const cc=$('#cartCount'); if(cc) cc.textContent=cart.length?cart.length+' ລາຍການ':'';
    const box=$('#cartItems'); if(!box)return;
    if(!cart.length){ box.innerHTML=`<div class="cart-empty">${I.cart}<span>ກະຕ່າຫວ່າງເປົ່າ</span></div>`; }
    else box.innerHTML=cart.map(it=>`<div class="ci" style="flex-direction:column;gap:6px;border-bottom:1px solid var(--line)">

          <div class="qty" style="flex:none"><button onclick="App.setQty('${it.key||it.id}',-1)">−</button>
            <input value="${it.qty}" onchange="App.setQtyVal('${it.key||it.id}',this.value)"><button onclick="App.setQty('${it.key||it.id}',1)">+</button></div>
          <div class="ci-info" style="flex:1"><div class="ci-name lo">${esc(it.name)} ${(()=>{const p=this._prod(it.id);return this.hasBig(p)?`<select class="inp" style="height:24px;padding:1px 6px;font-size:11px;width:auto;display:inline-block" onchange="App.changeUnit('${it.key||it.id}',this.value)"><option value="sub" ${(+it.basePer>1)?'':'selected'}>${esc(p.unit||'ໜ່ວຍ')}</option><option value="big" ${(+it.basePer>1)?'selected':''}>${esc(p.unitBig)}</option></select>`:`<span class="muted" style="font-weight:400">(${esc(it.unit)})</span>`})()}</div>
            <div class="ci-price">${fmt(it.price)} ${CONFIG.CURRENCY}</div></div>
          <div style="text-align:right"><div class="ci-total">${fmt(this.lineTotal(it))}</div></div>
          <button class="ci-del icon-btn" style="width:24px;height:24px;flex:none" onclick="App.rmCart('${it.key||it.id}')">${I.close}</button>
        </div>
        <div style="display:flex;align-items:center;gap:6px;width:100%;padding-left:2px">
          <span class="muted lo" style="font-size:11.5px">ສ່ວນຫຼຸດ/ແຖວ</span>
          <input class="inp" value="${it.disc||''}" placeholder="0" style="width:90px;text-align:right;padding:4px 8px;font-size:12px" onchange="App.setLineDisc('${it.key||it.id}',this.value)">
        </div>
      </div>`).join('');
    const sub=this.cartSub();
    const raw=+(this.state.discountRaw||0);
    const discMoney=this.state.discType==='%'?Math.round(sub*raw/100):raw;
    const total=Math.max(0,sub-discMoney);
    this.state.discount=discMoney;
    const vatRate=+(this.state.vatRate==null?10:this.state.vatRate); const vatOn=!!this.state.vatOn;
    const vatAmt=vatOn?Math.round(total*vatRate/100):0; const grand=total+vatAmt;
    const foot=$('#cartFoot'); if(!foot)return;
    foot.innerHTML=`
      <button class="btn lo" style="width:100%;background:linear-gradient(135deg,var(--gold),#eec069);color:#fff;border:none;margin-bottom:10px;justify-content:center" onclick="App.depositPromo()">${I.money} ເພີ່ມເງິນມັດຈຳ / ໂປຣໂມຊັນ</button>

  applyDiscount(v){

    const vatAmt=vatOn?Math.round(total*vatRate/100):0; const grand=total+vatAmt;

  async confirmPay(multi){
    const paid=+(this.state.payInput||0);
    const credit=(this.state.payType==='ເຄຣດິດ'||this.state.payType==='ຄ້າງຈ່າຍ');
    const paidFinal=(this.state.payType==='ຄ້າງຈ່າຍ')?0:paid;
    if(!credit && paid<this.state.payTotal){ toast('ຈຳນວນເງິນບໍ່ພຽງພໍ','err'); return; }
    const cart=this.state.cart;
    // ກວດສະຕັອກອີກຄັ້ງ (ນັບເປັນຍ່ອຍ) — ບລັອກຖ້າບໍ່ພໍຂາຍ
    const ids=[...new Set(cart.map(it=>it.id))];
    for(const pid of ids){
      const p=this._prod(pid); if(!p) continue;
      const av=this.availableStock(p); if(av===Infinity) continue;
      const need=this.cartBaseQty(pid);
      if(need>av){ toast('⚠️ ສິນຄ້າ "'+p.name+'" ບໍ່ພໍຂາຍ — ເຫຼືອ '+this.stockText(p),'err'); return; }
    }
    const lines=cart.map(it=>({name:it.name,unit:it.unit,qty:it.qty,price:it.price,disc:+it.disc||0,total:this.lineTotal(it)}));
    const now=new Date().toTimeString().slice(0,8);
    const runno=String((this.state.data.sales||[]).length+8+1).padStart(10,'0');
    const bill={
      runno, date:(this.state.saleDate||new Date().toISOString().slice(0,10))+' '+now,
      cashier:this.state.user.name, customer:this.state.posCust||'', branch:CONFIG.STORE_NAME,
      items:cart.reduce((a,b)=>a+b.qty,0), subtotal:this.cartSub(), discount:this.state.discount||0,
      beforeVat:this.cartBeforeVat(), vat:this.cartVat(), vatRate:this.state.vatOn?(+(this.state.vatRate)||0):0,
      total:this.state.payTotal, paid:paidFinal, paytype:multi?'ຫຼາຍຊ່ອງທາງ':(this.state.payType||'ເງິນສົດ'),
      note:this.state.payNote||'', lines:JSON.stringify(lines), currency:this.state.billCurrency||CONFIG.CURRENCY,
      billno:this._nextBillNo(),
      status:credit&&paidFinal<this.state.payTotal?'ຄ້າງຊຳລະ':'ສຳເລັດ'
    };
    // ບັນທຶກແບບໄວ: ສະແດງຜົນທັນທີ ແລ້ວສົ່ງຂຶ້ນ Sheet ໃນພື້ນຫຼັງ (ບໍ່ໃຫ້ລໍ)
    this.state.data.sales=this.state.data.sales||[]; this.state.data.sales.unshift(bill);
    Store.create('sales',bill).catch(function(e){ toast('⚠️ ບັນທຶກບິນຂຶ້ນ Sheet ບໍ່ສຳເລັດ — ກວດການເຊື່ອມ','err'); });
    for(const pid of ids){ this.deductStock(pid, this.cartBaseQty(pid)); }
    this.state.lastBill=Object.assign({},bill);
    if(this.state.shift){ this.state.shift.count++; this.state.shift.total+=(+bill.total||0); if(bill.paytype==='ເງິນສົດ') this.state.shift.cash+=(+bill.total||0); const sb=$('#shiftBtn'); if(sb) sb.innerHTML=I.logout+' ປິດກະ ('+this.state.shift.count+')'; }
    this.state.cart=[]; this.state.discount=0; this.state.discountRaw=''; this.state.billCurrency=CONFIG.CURRENCY; this.cartRender(); this.posRender(); this.posTxRender();
    this.showChange(this.state.lastBill);
  },
  // ຕັດສະຕັອກ (ນັບເປັນຍ່ອຍ). ບໍ່ໃຫ້ຕິດລົບ.
  deductStock(prodId, baseQty){

  renderCode(el, value, type, scale){
    if(!el) return; el.innerHTML=''; scale=scale||2; value=value||'0';
    try{
      if(type==='qr' && window.QRCode){
        const size=60+scale*26;
        new QRCode(el,{text:value,width:size,height:size,correctLevel:QRCode.CorrectLevel.M});
      } else if(window.JsBarcode){
        const svg=document.createElementNS('http://www.w3.org/2000/svg','svg'); el.appendChild(svg);
        JsBarcode(svg,value,{format:'CODE128',width:scale*0.9,height:38+scale*8,displayValue:true,fontSize:13,margin:4});
      } else { el.innerHTML=barcodeSVG(value)+'<div class="num" style="letter-spacing:2px">'+esc(value)+'</div>'; }
    }catch(e){ el.innerHTML=barcodeSVG(value)+'<div class="num">'+esc(value)+'</div>'; }
  },
  bcPrint(){
    const grid=$('#bcGrid'); if(!grid)return;
    const clone=grid.cloneNode(true);
    // ປ່ຽນ canvas (QR) ເປັນຮູບ ເພື່ອໃຫ້ພິມໄດ້
    const srcCanvases=grid.querySelectorAll('canvas'); const dstCanvases=clone.querySelectorAll('canvas');
    srcCanvases.forEach((cv,i)=>{ try{ const img=document.createElement('img'); img.src=cv.toDataURL('image/png'); img.style.width=cv.style.width||cv.width+'px'; if(dstCanvases[i]&&dstCanvases[i].parentNode) dstCanvases[i].parentNode.replaceChild(img,dstCanvases[i]); }catch(e){} });
    const pa=document.getElementById('printArea');
    pa.innerHTML='<div class="rc" style="width:190mm;margin:0 auto"><div style="display:grid;grid-template-columns:repeat('+(this.state.bcCols||3)+',1fr);gap:10px">'+clone.innerHTML+'</div></div>';
    document.body.classList.add('printing');
    const done=()=>{ document.body.classList.remove('printing'); pa.innerHTML=''; window.removeEventListener('afterprint',done); };
    window.addEventListener('afterprint',done); setTimeout(()=>window.print(),80);
  },

  _cbStash(){ var g=function(id){var e=document.getElementById(id);return e?e.value:'';}; this.state.cbDraft={date:g('cbDate'),desc:g('cbDesc'),amt:g('cbAmt'),ch:g('cbCh')}; },

  cbSave(){

  cbEdit(id){
    var r=(this.state.data.cashbook||[]).find(function(x){return x.id===id;}); if(!r)return;
    this.state.cbType=r.type; this.state.cbCur=r.currency||CONFIG.CURRENCY;

  cbDel(id){ this.delRowCB('cashbook',id,()=>{ this.state.data.cashbook=(this.state.data.cashbook||[]).filter(x=>x.id!==id); this.cbFilter(); }); },
  cbFilter(){
    var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
    var q=(g('cbQ')||'').toLowerCase(); var ft=g('cbFType')||'all'; var fc=g('cbFCur')||'all';
    var from=g('cbFrom'), to=g('cbTo');
    if(from)this.state.cbFrom=from; if(to)this.state.cbTo=to;
    var rows=(this.state.data.cashbook||[]).filter(function(r){
      var d=String(r.date||'').slice(0,10); var okD=(!from||d>=from)&&(!to||d<=to);
      var okT=ft==='all'||r.type===ft; var okC=fc==='all'||((r.currency==='ບາດ')?'ບາດ':'ກີບ')===fc;
      var okQ=!q||[r.desc,r.category,r.channel].some(function(v){return String(v||'').toLowerCase().indexOf(q)>=0;});
      return okD&&okT&&okC&&okQ;
    });
    var sum={'ກີບ':{inc:0,exp:0},'ບາດ':{inc:0,exp:0}};
    rows.forEach(function(r){ var cu=(r.currency==='ບາດ')?'ບາດ':'ກີບ'; if(r.type==='ຮັບ')sum[cu].inc+=(+r.amount||0); else sum[cu].exp+=(+r.amount||0); });
    var st=document.getElementById('cbStat');
    if(st){ st.innerHTML=['ກີບ','ບາດ'].map(function(cu){ var s=sum[cu]; var net=s.inc-s.exp;
      return '<div class="stat-card"><div class="s-top"><span class="s-lbl">ສະກຸນ '+cu+'</span><div class="s-ico" style="background:var(--brand-soft);color:var(--brand-2)">'+I.money+'</div></div>'+
      '<div style="display:flex;justify-content:space-between;font-size:13px;margin-top:8px"><span style="color:#16a34a;font-weight:700">ຮັບ '+fmt(s.inc)+'</span><span style="color:#e11d48;font-weight:700">ຈ່າຍ '+fmt(s.exp)+'</span></div>'+
      '<div class="s-val" style="margin-top:6px">ເຫຼືອ '+fmt(net)+' <small>'+cu+'</small></div></div>';
    }).join(''); }
    var body=document.getElementById('cbBody'); if(!body)return;
    if(!rows.length){ body.innerHTML='<tr><td colspan="6"><div class="empty">'+I.inbox+'<div class="lo">ບໍ່ມີລາຍການໃນຊ່ວງນີ້</div></div></td></tr>'; return; }
    body.innerHTML=rows.map(function(r){ var inc=r.type==='ຮັບ';
      return '<tr><td class="num muted">'+esc(fmtDate(r.date))+'</td>'+
      '<td><span class="pill '+(inc?'pill-green':'pill-red')+'">'+(inc?'ລາຍຮັບ':'ລາຍຈ່າຍ')+'</span></td>'+
      '<td class="lo"><b>'+esc(r.desc||'-')+'</b><div class="muted" style="font-size:11px">'+esc(r.category||'')+'</div></td>'+
      '<td class="num" style="font-weight:800;color:'+(inc?'#16a34a':'#e11d48')+'">'+(inc?'+':'-')+fmt(r.amount)+' '+esc(r.currency||'ກີບ')+'</td>'+
      '<td class="lo muted">'+esc(r.channel||'')+'</td>'+
      '<td>'+rowActions("App.cbEdit('"+r.id+"')","App.cbDel('"+r.id+"')")+'</td></tr>';
    }).join('');
  },

  pickProdImage(){
    const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
    inp.style.position='fixed'; inp.style.left='-9999px'; document.body.appendChild(inp);
    const cleanup=()=>{ try{document.body.removeChild(inp);}catch(e){} };
    inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f){ cleanup(); return; }
      const r=new FileReader();
      r.onload=()=>{ const img=new Image();
        img.onload=()=>{ const max=260; let w=img.width,h=img.height;
          if(w>h){ if(w>max){ h=Math.round(h*max/w); w=max; } } else { if(h>max){ w=Math.round(w*max/h); h=max; } }
          const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
          cv.getContext('2d').drawImage(img,0,0,w,h);
          let data; try{ data=cv.toDataURL('image/jpeg',0.72); }catch(e){ data=r.result; }
          App.setProdImage(data); const u=document.getElementById('pfUrl'); if(u)u.value='';
          toast('ໂຫຼດຮູບແລ້ວ (ຫຍໍ້ຂະໜາດອັດຕະໂນມັດ)','ok'); cleanup(); };
        img.onerror=()=>{ App.setProdImage(r.result); toast('ໂຫຼດຮູບແລ້ວ','ok'); cleanup(); };
        img.src=r.result; };
      r.onerror=()=>{ toast('ອ່ານໄຟລ໌ບໍ່ໄດ້','err'); cleanup(); };
      r.readAsDataURL(f);
    };
    inp.click();
  },
  setProdImage(val){
    this._prodImg = val||'';
    const hid=document.getElementById('pfImage'); if(hid)hid.value=val||'';
    const pv=document.getElementById('pfPreview'); if(pv) pv.innerHTML=val?('<img src="'+esc(val)+'" style="width:100%;height:100%;object-fit:cover">'):I.image;
  },
  clearProdImage(){ App.setProdImage(''); const u=document.getElementById('pfUrl'); if(u)u.value=''; },
  async saveProduct(id){
    const row={};
    document.querySelectorAll('#prodForm [data-k]').forEach(el=>{

      else row[el.dataset.k]=el.value;

    row.image = this._prodImg||'';  // ໃຊ້ຄ່າຮູບຈາກຕົວແປ ໃຫ້ແນ່ນອນ
    if(!row.name){ toast('ກະລຸນາໃສ່ຊື່ສິນຄ້າ','err'); return; }
    if(!row.barcode) row.barcode=String(Date.now()).slice(-6);
    try{
      if(id){ row.id=id; await Store.update('products',row); toast('ບັນທຶກການແກ້ໄຂແລ້ວ','ok'); }

  async doProdImport(){
    const f=((document.getElementById('impFile')||{}).files||[])[0]; if(!f){toast('ກະລຸນາເລືອກໄຟລ໌ກ່ອນ','err');return;}
    const forceCat=(document.getElementById('impCat')||{}).value||'';
    const t=await f.text();
    const lines=t.split(/\r?\n/).filter(x=>x.trim()); if(lines.length<2){toast('ໄຟລ໌ວ່າງເປົ່າ ຫຼື ບໍ່ມີຂໍ້ມູນ','err');return;}
    const parse=line=>{ const out=[]; let cur='',q=false; for(let i=0;i<line.length;i++){ const ch=line[i];
      if(ch==='"'){ if(q&&line[i+1]==='"'){cur+='"';i++;} else q=!q; } else if(ch===','&&!q){ out.push(cur); cur=''; } else cur+=ch; } out.push(cur); return out; };
    const head=parse(lines[0]).map(h=>h.trim().toLowerCase()); const ix=k=>head.indexOf(k);
    let n=0;
    for(let i=1;i<lines.length;i++){ const c=parse(lines[i]);
      const g=k=>{ const j=ix(k); return j>=0?String(c[j]||'').trim():''; };
      const name=g('name')||g('ຊື່ສິນຄ້າ'); if(!name)continue;
      const row={ barcode:g('barcode')||String(Date.now()+i).slice(-6), name,
        category:forceCat||g('category'), unit:g('unit')||'ໜ່ວຍ', vendor:g('vendor'),
        cost:+g('cost')||0, price:+g('price')||+g('price1')||0, price2:+g('price2')||'', price3:+g('price3')||'',
        price4:+g('price4')||'', price5:+g('price5')||'', stock:+g('stock')||0, lowstock:+g('lowstock')||0,
        points:+g('points')||0, weight:+g('weight')||0, description:g('description') };
      await Store.create('products',row); n++;
    }
    this.state.data.products=await Store.list('products'); closeModal(); this.prodRender();
    toast('ນຳເຂົ້າ '+n+' ສິນຄ້າສຳເລັດ','ok');
  },

  repFilter(){
    var gv=function(id){ var el=document.getElementById(id); return el?el.value:''; };
    var from=gv('repFrom'), to=gv('repTo'); var type=gv('repType')||'all';
    if(from)this.state.repFrom=from; if(to)this.state.repTo=to; this.state.repType=type;
    var inRange=function(d){ d=String(d||'').slice(0,10); return (!from||d>=from)&&(!to||d<=to); };
    var curOf=function(x){ return (x==='ບາດ')?'ບາດ':'ກີບ'; };
    var tx=[]; var S=this.state.data;
    if(type==='all'||type==='sales'){ (S.sales||[]).forEach(function(s){ if(!inRange(s.date))return; tx.push({date:String(s.date||'').slice(0,16),fn:'ຂາຍ',no:s.billno||s.runno||'',party:s.customer||'ທົ່ວໄປ',detail:(s.items||'0')+' ລາຍການ',cur:curOf(s.currency),io:'in',amt:+s.total||0,note:s.status||''}); }); }
    if(type==='all'||type==='repair'){ (S.repair||[]).forEach(function(r){ var dd=r.printdate||r.recorded; if(!inRange(dd))return; tx.push({date:fmtDate(dd),fn:'ສ້ອມແປງ',no:r.printno||r.runno||'',party:r.name||'',detail:((r.product||'')+' '+(r.brand||'')).trim(),cur:curOf(r.currency),io:'in',amt:+r.cost||0,note:r.status||''}); }); }
    if(type==='all'||type==='printjob'){ (S.printjob||[]).forEach(function(p){ var dd=p.printdate||p.recorded||p.orderdate; if(!inRange(dd))return; tx.push({date:fmtDate(dd),fn:'ສິ່ງພິມ',no:p.printno||p.runno||'',party:p.name||'',detail:p.content||'',cur:curOf(p.currency),io:'in',amt:+p.price||0,note:p.status||''}); }); }
    if(type==='all'||type==='cashbook'){ (S.cashbook||[]).forEach(function(cb){ if(!inRange(cb.date))return; var inc=cb.type==='ຮັບ'; tx.push({date:fmtDate(cb.date),fn:inc?'ລາຍຮັບ':'ລາຍຈ່າຍ',no:'',party:cb.desc||'',detail:cb.category||'',cur:curOf(cb.currency),io:inc?'in':'out',amt:+cb.amount||0,note:cb.channel||''}); }); }
    var sum={'ກີບ':{inc:0,exp:0,n:0},'ບາດ':{inc:0,exp:0,n:0}};
    tx.forEach(function(t){ var s=sum[t.cur]; s.n++; if(t.io==='in')s.inc+=t.amt; else s.exp+=t.amt; });

      '<div style="display:flex;justify-content:space-between;font-size:13px;margin-top:8px"><span style="color:#16a34a;font-weight:700">ຮັບ '+fmt(s.inc)+'</span><span style="color:#e11d48;font-weight:700">ຈ່າຍ '+fmt(s.exp)+'</span></div>'+
      '<div class="s-val" style="margin-top:6px">ຍອດເຫຼືອ '+fmt(net)+' <small>'+cu+'</small></div></div>';
    }).join(''); }
    var fnOrder=['ຂາຍ','ສ້ອມແປງ','ສິ່ງພິມ','ລາຍຮັບ','ລາຍຈ່າຍ'];
    var byFn={};
    tx.forEach(function(t){ if(!byFn[t.fn])byFn[t.fn]={n:0,kip:0,baht:0,io:t.io}; var b=byFn[t.fn]; b.n++; if(t.cur==='ບາດ')b.baht+=t.amt; else b.kip+=t.amt; });
    var fb=document.getElementById('repFnBody');

      fnOrder.forEach(function(fn){ var b=byFn[fn]; if(!b)return; var neg=(fn==='ລາຍຈ່າຍ'); var sign=neg?'-':''; if(neg){tK-=b.kip;tB-=b.baht;}else{tK+=b.kip;tB+=b.baht;}

    }).join('') : '<tr><td colspan="6"><div class="empty">'+I.inbox+'<div class="lo">ບໍ່ມີລາຍການ</div></div></td></tr>'; }
    var dc=document.getElementById('repDetailCount'); if(dc)dc.textContent=tx.length+' ລາຍການ';
  },

  crPay(id){

    await Store.update('sales',{id,paid:s.paid,status:s.status});

  cusImport(){
    const inp=document.createElement('input'); inp.type='file'; inp.accept='.csv,text/csv';
    inp.style.position='fixed'; inp.style.left='-9999px'; document.body.appendChild(inp);
    inp.onchange=async()=>{ const f=inp.files&&inp.files[0]; if(!f){try{document.body.removeChild(inp);}catch(e){} return;} const text=await f.text();
      const lines=text.split(/\r?\n/).filter(x=>x.trim()); if(lines.length<2){toast('ໄຟລ໌ວ່າງເປົ່າ','err');return;}
      const head=lines[0].split(',').map(h=>h.trim().toLowerCase());
      const idx=k=>head.indexOf(k);
      let n=0;
      for(let i=1;i<lines.length;i++){ const cols=lines[i].split(',');
        const row={ name:(cols[idx('name')]||cols[idx('ຊື່')]||cols[0]||'').replace(/^"|"$/g,'').trim(),
          group:(cols[idx('group')]||'').trim(), phone:(cols[idx('phone')]||'').trim(),
          email:(cols[idx('email')]||'').trim(), address:(cols[idx('address')]||'').trim(),
          birthday:(cols[idx('birthday')]||'').trim(), code:(cols[idx('code')]||'').trim() };
        if(row.name){ await Store.create('customers',row); n++; } }
      this.state.data.customers=await Store.list('customers'); this.cusRender();
      toast('ນຳເຂົ້າ '+n+' ລາຍຊື່ສຳເລັດ','ok');
      try{document.body.removeChild(inp);}catch(e){}
    };
    inp.click();
  },

  _qrBlock(size){
    const qs=(App.qr||[]).filter(function(q){return q&&q.img;});
    if(!qs.length) return '';
    const slip = size==='slip'; const a5 = size==='a5';
    const big = a5 ? '2cm' : '2.5cm';
    const gap = a5 ? '1cm' : '2cm';
    const wrap = slip ? 'display:flex;justify-content:center;gap:5px;align-items:flex-start' : 'display:flex;justify-content:center;gap:'+gap+';flex-wrap:wrap';
    const item = slip ? 'flex:1;max-width:2.6cm;text-align:center;font-size:9px' : 'text-align:center;font-size:10px';
    const imgSt = slip ? 'width:100%;height:auto;object-fit:contain' : 'width:'+big+';height:'+big+';object-fit:contain';
    const mt = a5 ? '8px' : '14px';
    return '<div style="margin-top:'+mt+';border-top:1px dashed #999;padding-top:8px;page-break-inside:avoid"><div class="center bold" style="font-size:11px;margin-bottom:6px">ສະແກນ QR ເພື່ອຊຳລະເງິນ</div><div style="'+wrap+'">'+qs.map(function(q){return '<div style="'+item+'"><img src="'+esc(q.img)+'" style="'+imgSt+'"><div style="margin-top:2px">'+esc(q.name||'')+'</div></div>';}).join('')+'</div></div>';
  },
  _imgResize(file,cb){ var r=new FileReader(); r.onload=function(e){ var img=new Image(); img.onload=function(){ var max=320; var w=img.width,h=img.height; if(w>h&&w>max){h=Math.round(h*max/w);w=max;}else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;} var cv=document.createElement('canvas'); cv.width=w;cv.height=h; try{ cv.getContext('2d').drawImage(img,0,0,w,h); cb(cv.toDataURL('image/jpeg',0.5)); }catch(_){ cb(e.target.result); } }; img.onerror=function(){ cb(e.target.result); }; img.src=e.target.result; }; r.readAsDataURL(file); },
  _imgToField(input,k){ var fl=input.files&&input.files[0]; if(!fl)return; App._imgResize(fl,function(b64){ var hd=document.querySelector('#formModal [data-k="'+k+'"]'); if(hd)hd.value=b64; var p=document.getElementById('imgprev_'+k); if(p){p.style.backgroundImage='url('+b64+')';p.textContent='';} toast('ໂຫຼດຮູບແລ້ວ','ok'); }); },
  _imgClear(k){ var hd=document.querySelector('#formModal [data-k="'+k+'"]'); if(hd)hd.value=''; var p=document.getElementById('imgprev_'+k); if(p){p.style.backgroundImage='';p.textContent='ບໍ່ມີຮູບ';} },
  _nextBillNo(){ var seq=(+localStorage_get('ksv-billseq','0'))||0; seq++; localStorage_set('ksv-billseq',String(seq)); return 'KSV'+String(seq).padStart(4,'0'); },
  _ensurePrintNo(table,r){
    if(r.printno) return;
    r.printno=this._nextBillNo();
    r.printdate=new Date().toISOString().slice(0,10);

  _printHTML(html){
    const pa=document.getElementById('printArea'); pa.innerHTML=html;
    const imgs=[...pa.querySelectorAll('img')];
    const ready=Promise.all(imgs.map(im=> (im.complete&&im.naturalWidth)?Promise.resolve():new Promise(res=>{ im.onload=res; im.onerror=res; })));
    const go=()=>{ document.body.classList.add('printing'); const done=()=>{ document.body.classList.remove('printing'); pa.innerHTML=''; window.removeEventListener('afterprint',done); }; window.addEventListener('afterprint',done); window.print(); };

    const keys=Object.keys(rows[0]); const csv=[keys.join(',')].concat(rows.map(r=>keys.map(k=>'"'+String(r[k]==null?'':r[k]).replace(/"/g,'""')+'"').join(','))).join('\n');

    o.addFn?`<button class="btn btn-primary lo" onclick="${o.addFn}">${I.plus} ${esc(o.addLabel||'ເພີ່ມ')}</button>`:''
  ].join('');
  const body = o.rows.length ? o.rows.map(o.render).join('') :
    `<tr><td colspan="${o.cols.length}"><div class="empty">${I.inbox}<div class="lo">${esc(o.empty||'ຍັງບໍ່ມີຂໍ້ມູນ')}</div></div></td></tr>`;
  return `<div class="card">
    <div class="card-head"><h3>${I[o.icon]}<span class="lo">${esc(o.title)}</span></h3>
      <span class="count lo">${esc(o.count||'')}</span><div class="card-tools">${tools}</div></div>
    <div class="table-wrap"><table><thead><tr>${o.cols.map(c=>`<th class="lo">${esc(c)}</th>`).join('')}</tr></thead>
    <tbody>${body}</tbody></table></div></div>`;
}

function filterTable(inp){
  const q=inp.value.toLowerCase(); const tb=inp.closest('.card').querySelector('tbody');
  tb.querySelectorAll('tr').forEach(tr=>{ tr.style.display = tr.textContent.toLowerCase().includes(q)?'':'none'; });
}
/* simple Code128-ish visual barcode (decorative, scannable-looking) */
function barcodeSVG(code){
  let bars=''; let x=0; const seed=code.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  for(let i=0;i<48;i++){ const w=((seed>>(i%9))&1)?3:(i%3===0?2:1); if(i%2===0){bars+=`<rect x="${x}" y="0" width="${w}" height="46" fill="#0d1320"/>`;} x+=w+1; }
  return `<svg viewBox="0 0 ${x} 46" style="width:100%;height:46px" preserveAspectRatio="none">${bars}</svg>`;
}

/* tiny localStorage wrappers (artifact-safe: try/catch) */
function localStorage_get(k,d){ try{return localStorage.getItem(k)||d}catch(e){return d} }
function localStorage_set(k,v){ try{localStorage.setItem(k,v)}catch(e){} }

/* enter key on login */
document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&$('#login').style.display!=='none') App.login(); });
/* SpaceBar = ຮັບເງິນ ໃນໜ້າຂາຍ */
document.addEventListener('keydown',e=>{
  if(e.code==='Space' && App.state && App.state.route==='pos' && !MODAL){
    const tag=(document.activeElement&&document.activeElement.tagName)||'';
    if(['INPUT','SELECT','TEXTAREA'].includes(tag)) return;
    if(App.state.cart&&App.state.cart.length){ e.preventDefault(); App.checkout(); }
  }
});
/* Enter = ຢືນຢັນຊຳລະ, Esc = ປິດ modal */
document.addEventListener('keydown',e=>{
  if(!MODAL) return;
  if(e.key==='Enter'){ if($('#payAmt')){ e.preventDefault(); App.confirmPay(); } else if($('#mpSum')){ e.preventDefault(); App.confirmPay(true); } }
  else if(e.key==='Escape'){ closeModal(); }
});
